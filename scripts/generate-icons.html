<!DOCTYPE html>
<html><body>
<script>
function makeIcon(size) {
  const c = document.createElement('canvas')
  c.width = size; c.height = size
  const ctx = c.getContext('2d')
  // Background
  ctx.fillStyle = '#1a1a2e'
  ctx.beginPath()
  ctx.roundRect(0, 0, size, size, size * 0.15)
  ctx.fill()
  // Grid lines
  ctx.strokeStyle = '#333'
  ctx.lineWidth = size * 0.005
  for (let i = 1; i < 6; i++) {
    ctx.beginPath()
    ctx.moveTo(size * i / 6, size * 0.15)
    ctx.lineTo(size * i / 6, size * 0.85)
    ctx.stroke()
    ctx.beginPath()
    ctx.moveTo(size * 0.15, size * i / 6)
    ctx.lineTo(size * 0.85, size * i / 6)
    ctx.stroke()
  }
  // Floor plan L-shape
  ctx.strokeStyle = '#4488ff'
  ctx.lineWidth = size * 0.03
  ctx.beginPath()
  ctx.moveTo(size * 0.25, size * 0.25)
  ctx.lineTo(size * 0.75, size * 0.25)
  ctx.lineTo(size * 0.75, size * 0.55)
  ctx.lineTo(size * 0.55, size * 0.55)
  ctx.lineTo(size * 0.55, size * 0.75)
  ctx.lineTo(size * 0.25, size * 0.75)
  ctx.closePath()
  ctx.stroke()
  // Endpoints
  ctx.fillStyle = '#00ff88'
  const r = size * 0.02
  for (const [x,y] of [[0.25,0.25],[0.75,0.25],[0.75,0.55],[0.55,0.55],[0.55,0.75],[0.25,0.75]]) {
    ctx.beginPath(); ctx.arc(size*x, size*y, r, 0, Math.PI*2); ctx.fill()
  }
  // Text
  ctx.fillStyle = '#4488ff'
  ctx.font = `bold ${size*0.08}px sans-serif`
  ctx.textAlign = 'center'
  ctx.fillText('RD', size*0.5, size*0.93)
  return c.toDataURL('image/png')
}
for (const s of [192, 512]) {
  const a = document.createElement('a')
  a.href = makeIcon(s)
  a.download = `icon-${s}.png`
  a.click()
}
document.body.innerHTML = '<h2>Icons downloaded! Move them to public/ folder</h2>'
</script>
</body></html>
